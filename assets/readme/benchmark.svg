<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">ClaudeX Flow v1.7.9 regression evidence</title>
  <desc id="desc">One same-task run completed in 89.63 seconds versus 134.44 seconds, with 31 of 31 checks and clean diff hygiene on version 1.7.9.</desc>
  <rect width="1200" height="300" rx="24" fill="#0B0F16"/>
  <g font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
    <text x="48" y="48" fill="#7D899C" font-size="13" letter-spacing="2">BOUNDED PROOF / SAME-TASK REGRESSION / SINGLE RUN</text>
    <text x="48" y="88" fill="#F5F7FB" font-size="25" font-weight="700">Less orchestration tail. Same frozen acceptance.</text>
    <g transform="translate(48 122)">
      <text x="0" y="23" fill="#9BA6B7" font-size="13">v1.7.8</text><rect x="92" y="3" width="640" height="25" rx="12.5" fill="#29313E"/><text x="748" y="23" fill="#B8C0CC" font-size="14">134.44s</text>
      <text x="0" y="75" fill="#36D4FF" font-size="13">v1.7.9</text><rect x="92" y="55" width="427" height="25" rx="12.5" fill="url(#bar)"/><text x="535" y="75" fill="#E7FBFF" font-size="14">89.63s</text>
      <defs><linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#36D4FF"/><stop offset="1" stop-color="#F06CFF"/></linearGradient></defs>
    </g>
    <g transform="translate(884 112)">
      <rect width="268" height="132" rx="16" fill="#101722" stroke="#303B4C"/>
      <text x="22" y="33" fill="#7D899C" font-size="11">V1.7.9 RESULT</text>
      <text x="22" y="72" fill="#36D4FF" font-size="24" font-weight="700">31 / 31</text>
      <text x="22" y="96" fill="#B5BFCE" font-size="12">checks passed</text>
      <path d="M139 50V103" stroke="#303B4C"/>
      <text x="157" y="72" fill="#F06CFF" font-size="17" font-weight="700">−33.3%</text>
      <text x="157" y="96" fill="#B5BFCE" font-size="11">wall time</text>
      <text x="22" y="118" fill="#7D899C" font-size="10">DIFF HYGIENE · PASS</text>
    </g>
    <text x="48" y="274" fill="#69758A" font-size="11">Not a general winner claim. Replicate across workloads before changing defaults.</text>
  </g>
</svg>
